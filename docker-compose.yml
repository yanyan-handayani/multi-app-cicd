version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - node

  node:
    image: node:18
    container_name: node-app
    working_dir: /app
    volumes:
      - ./node:/app
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
