server {
    listen 80;
    server_name aws.yanyan.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aws.yanyan.my.id;

    ssl_certificate /etc/letsencrypt/live/aws.yanyan.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aws.yanyan.my.id/privkey.pem;

    location / {
        return 200 'Landing page coming soon';
        add_header Content-Type text/plain;
    }

    location = /node-docker {
        return 301 /node-docker/;
    }

    location /node-docker/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Prefix /node-docker;
    }

    location = /django {
        return 301 /django/;
    }

    location /django/ {
        return 200 'Django coming soon';
        add_header Content-Type text/plain;
    }

    location = /laravel {
        return 301 /laravel/;
    }

    location /laravel/ {
        return 200 'Laravel coming soon';
        add_header Content-Type text/plain;
    }
}