server {
    listen 80;
    server_name aws.yanyan.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aws.yanyan.my.id;

    ssl_certificate /etc/letsencrypt/live/aws.yanyan.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aws.yanyan.my.id/privkey.pem;

    root /opt/multi-app-cicd/apps/landing;
    index index.html index.htm index.php;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /node-docker {
        return 301 /node-docker/;
    }

    location /node-docker/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Prefix /node-docker;
    }

    location = /django {
        return 301 /django/;
    }

    location /django/static/ {
        alias /opt/multi-app-cicd/apps/django/app/static/;
    }

    location /django/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Script-Name /django;
        proxy_set_header X-Forwarded-Prefix /django;
    }

    location = /laravel {
        return 301 /laravel/;
    }

    location /laravel/ {
        alias /opt/multi-app-cicd/apps/laravel/public/;
        try_files $uri $uri/ /laravel/index.php?$query_string;
    }

    location ~ ^/laravel/.*\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME /opt/multi-app-cicd/apps/laravel/public$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }
}